services:
  api-service:
    build:
      context: ./api-service
      dockerfile: Dockerfile
    networks:
      - backend-network
      - api-network
    ports:
      - "8080:8080"
    environment:
      - DATA_SERVICE_BASE_URL=${DATA_SERVICE_BASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9093
      - KAFKA_TOPIC=${TOPIC}
      - SERVER_PORT=8080
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      data-service:
        condition: service_started

  data-service:
    build:
      context: ./data-service
      dockerfile: Dockerfile
    networks:
      - backend-network
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9093
      - KAFKA_TOPIC=${TOPIC}
      - SERVER_PORT=8081
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - backend-network
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  zookeeper:
    image: wurstmeister/zookeeper:3.4.6
    networks:
      - backend-network

  kafka:
    image: confluentinc/cp-kafka:7.7.8
    networks:
      - backend-network
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CONFLUENT_SUPPORT_METRICS_ENABLE: "false"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9093 1 20"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  kafka-init:
    image: confluentinc/cp-kafka:7.7.8
    networks:
      - backend-network
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - TOPIC=${TOPIC}
    entrypoint: /bin/sh
    command: >
      -c "kafka-topics --create --if-not-exists --bootstrap-server kafka:9093 --partitions 2 --replication-factor 1 --topic $${TOPIC}"

volumes:
  postgres-data:

networks:
  backend-network:
    driver: bridge
    internal: true
  api-network:
    driver: bridge