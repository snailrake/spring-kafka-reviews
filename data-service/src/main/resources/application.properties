server.port=${SERVER_PORT:8081}

kafka.topic=${KAFKA_TOPIC:restaurant-reviews}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=reviews-data-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:reviews_db}
spring.datasource.username=${POSTGRES_USER:reviews_user}
spring.datasource.password=${POSTGRES_PASSWORD:reviews_password}

spring.sql.init.mode=never